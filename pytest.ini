[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -p no:cloud_dog_config
    --verbose
    --tb=short
    -v
    --capture=no
    --showlocals
    # Coverage options (uncomment when pytest-cov is installed)
    # --cov=src
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-fail-under=80
asyncio_mode = auto
enable_assertion_pass_hook = true

markers =
    # --- Legacy lowercase aliases (kept for backward compat) ---
    unit: marks tests as unit tests (legacy; prefer QT/UT/ST/IT/AT per PS-REQ-TEST-TRACE)
    integration: marks tests as integration tests (legacy alias)
    system: marks tests as system tests (legacy alias)
    application: marks tests as application tests (legacy alias)
    quality: QT tier (legacy alias)
    functional: marks tests as functional tests
    performance: marks tests as performance tests
    security: marks tests as security tests
    # --- Canonical tier markers (UPPER-CASE per PS-REQ-TEST-TRACE §6.1) — W28C-1715 ---
    QT: quality-gate tier (static analysis, linting, package compliance)
    UT: unit-test tier (pure in-process, no external deps)
    ST: system-test tier (one running service, no downstream deps)
    IT: integration-test tier (two or more services wired together)
    AT: application-test tier (full stack, real browser / end-to-end)
    # --- Canonical surface markers (lower-case per PS-REQ-TEST-TRACE §6.1) ---
    api: exercises the HTTP API surface
    a2a: exercises the A2A agent-to-agent surface
    webui: exercises the browser WebUI surface via Playwright
    cli: exercises CLI / in-process / internal-only surface
    internal: exercises internal library / helper logic
    # --- Canonical semantic markers ---
    req(*ids): binds test to one or more requirement IDs (FR-NNN / CS-NNN / NF-NNN)
    probe: orphan test — not yet bound to a requirement
    negative: test asserts a denied / error / rejection outcome
    # --- Environment / capability markers ---
    llm: requires live LLM endpoint (Ollama/OpenRouter)
    vdb: requires vector database (Chroma/Qdrant/OpenSearch)
    db: requires relational database (MySQL/PostgreSQL)
    smtp: requires SMTP/IMAP service
    mcp: requires external MCP server(s)
    docker: requires Docker build/run
    pure: no external dependencies
    fast: completes in <10 seconds
    slow: takes 10-120 seconds
    heavy: takes >120 seconds
    timeout(timeout_value): Set timeout for specific test (e.g., @pytest.mark.timeout(60))
    chroma: marks tests requiring Chroma
    qdrant: marks tests requiring Qdrant
    opensearch: marks tests requiring OpenSearch
    weaviate: marks tests requiring Weaviate
    pgvector: marks tests requiring PGVector
    requires_external_service: marks tests requiring external services

filterwarnings =
    ignore::DeprecationWarning:weaviate
    ignore:.*Api key is used with an insecure connection.*:UserWarning
